{% extends "base.html" %}
{% block title %}Sign in — CloseOut{% endblock %}

{% block body %}
<div class="login-wrap">
  <div class="login-card">
    <h1>CloseOut</h1>
    <p>Sign in to log your day and generate your EOD report.</p>
    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
    {% if msg %}<div class="login-error" style="color:var(--amber);background:var(--amber-dim)">{{ msg }}</div>{% endif %}
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
